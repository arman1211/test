<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INCOMING TRANSMISSION</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&family=Noto+Sans+Bengali:wght@400;700&display=swap"
        rel="stylesheet">

    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --neon-green: #39ff14;
            --dark-bg: #0a0a0a;
            --screen-curve: 2px;
        }

        body {
            background-color: #000;
            color: var(--neon-green);
            font-family: 'VT323', monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            text-shadow: 0 0 5px var(--neon-green);
        }

        .bangla {
            font-family: 'Noto Sans Bengali', sans-serif;
            text-shadow: none;
        }

        .pixel-font {
            font-family: 'Press Start 2P', cursive;
        }

        /* CRT Effect */
        .crt::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .crt::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: rgba(18, 16, 16, 0.1);
            opacity: 0;
            z-index: 2;
            pointer-events: none;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% {
                opacity: 0.027906;
            }

            5% {
                opacity: 0.048532;
            }

            10% {
                opacity: 0.01309;
            }

            15% {
                opacity: 0.0573;
            }

            20% {
                opacity: 0.009;
            }
        }

        /* Warp Canvas */
        #warp-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0;
            transition: opacity 1s;
        }

        /* --- UI LAYOUT --- */
        #container {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Incoming Call Box */
        .call-box {
            border: 4px double var(--neon-green);
            padding: 20px;
            text-align: center;
            animation: pulse-border 1s infinite;
            background: rgba(0, 20, 0, 0.9);
            max-width: 90%;
        }

        @keyframes pulse-border {
            0% {
                box-shadow: 0 0 5px var(--neon-green);
                border-color: #fff;
            }

            50% {
                box-shadow: 0 0 20px var(--neon-green);
                border-color: var(--neon-green);
            }

            100% {
                box-shadow: 0 0 5px var(--neon-green);
                border-color: #fff;
            }
        }

        /* Chat Interface */
        #chat-interface {
            width: 100%;
            max-width: 500px;
            height: 70vh;
            border: 2px solid #333;
            background: #000;
            display: none;
            /* Hidden initially */
            flex-direction: column;
        }

        #chat-window {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scrollbar-width: thin;
            scrollbar-color: var(--neon-green) #000;
        }

        .msg {
            padding: 10px 15px;
            border-radius: 4px;
            max-width: 85%;
            font-size: 1.2rem;
            line-height: 1.2;
            position: relative;
        }

        .msg-future {
            align-self: flex-start;
            border: 1px solid var(--neon-green);
            background: rgba(0, 255, 0, 0.1);
            color: var(--neon-green);
        }

        .msg-future::before {
            content: "FUTURE ROMANA (Year 2075)";
            display: block;
            font-size: 0.7rem;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .msg-user {
            align-self: flex-end;
            border: 1px solid #0ff;
            background: rgba(0, 255, 255, 0.1);
            color: #0ff;
            text-align: right;
            text-shadow: 0 0 5px #0ff;
        }

        .msg-user::before {
            content: "YOU (Year 2025)";
            display: block;
            font-size: 0.7rem;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        /* Reply Options */
        #options-area {
            padding: 10px;
            border-top: 1px solid #333;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 100px;
            justify-content: center;
        }

        .reply-btn {
            background: transparent;
            border: 1px solid #0ff;
            color: #0ff;
            padding: 10px;
            cursor: pointer;
            font-family: 'VT323', monospace;
            font-size: 1.1rem;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .reply-btn:hover {
            background: #0ff;
            color: #000;
        }

        /* Final Card */
        #final-card {
            display: none;
            text-align: center;
            animation: popIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% {
                transform: scale(0) rotate(180deg);
                opacity: 0;
            }

            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        .rainbow-text {
            background: linear-gradient(to right, #ef5350, #f48fb1, #7e57c2, #2196f3, #26c6da, #43a047, #eeff41, #f9a825, #ff5722);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Press Start 2P';
            line-height: 1.5;
            text-shadow: none;
        }
    </style>
</head>

<body class="crt">

    <audio id="static-sound" loop src="https://assets.mixkit.co/sfx/preview/mixkit-radio-static-noise-2565.mp3"></audio>
    <audio id="typing-sound"
        src="https://assets.mixkit.co/sfx/preview/mixkit-mechanical-keyboard-typing-1386.mp3"></audio>
    <audio id="warp-sound"
        src="https://assets.mixkit.co/sfx/preview/mixkit-sci-fi-plasma-gun-power-up-1679.mp3"></audio>

    <canvas id="warp-canvas"></canvas>

    <div id="container">

        <!-- SCREEN 1: INCOMING CALL -->
        <div id="incoming-screen" class="call-box">
            <div class="text-6xl mb-4 animate-bounce">📡</div>
            <h1 class="text-3xl mb-2">INCOMING TRANSMISSION</h1>
            <p class="text-xl mb-6 blink">SOURCE: YEAR 2075</p>
            <p class="text-sm text-gray-400 mb-8 font-mono">CONNECTION STABILITY: 12%</p>

            <button onclick="acceptCall()"
                class="bg-green-600 hover:bg-green-500 text-black font-bold py-3 px-8 text-2xl border-2 border-green-400 shadow-[0_0_15px_#39ff14]">
                [ ACCEPT ]
            </button>
        </div>

        <!-- SCREEN 2: CHAT -->
        <div id="chat-interface">
            <div class="bg-gray-900 p-2 text-center text-xs border-b border-gray-700 text-gray-400">
                ENCRYPTED CHANNEL • 128-BIT QUANTUM LINK
            </div>

            <div id="chat-window">
                <!-- Messages go here -->
            </div>

            <div id="options-area">
                <!-- Buttons go here -->
            </div>
        </div>

        <!-- SCREEN 3: FINALE -->
        <div id="final-card"
            class="relative z-50 p-6 bg-black/80 border-4 border-white rounded-xl shadow-[0_0_50px_rgba(255,255,255,0.5)]">
            <p class="text-sm text-gray-400 mb-4">Transmission Received: "Birthday_Gift.exe"</p>

            <h1 class="text-4xl md:text-6xl mb-6 rainbow-text">HAPPY<br>BIRTHDAY<br>ROMANA!</h1>

            <p class="text-xl text-white mb-6 bangla">
                "তুই বুড়ি হলেও আমার বেস্ট ফ্রেন্ড থাকবি।"
            </p>

            <div class="border-t border-gray-600 pt-4 mt-4">
                <p class="text-sm text-green-400">Mission: Survive Marriage.</p>
                <p class="text-sm text-green-400">Status: You got this.</p>
                <p class="text-xs text-gray-500 mt-4">Love, Arman (from 2025)</p>
            </div>
        </div>

    </div>

    <script>
        // --- DATA ---
        const script = [
            {
                sender: 'future',
                text: "Hello? Is this thing on? *taps mic*... Romana? Is that you? Look at you, so young! Not a single wrinkle yet.",
                delay: 1000,
                reply: "Who is this??"
            },
            {
                sender: 'future',
                text: "It's ME! Well, YOU. From the year 2075. I'm 86 years old now. My back hurts, and I lost my teeth eating sticky rice yesterday.",
                delay: 1500,
                reply: "Wait, seriously?"
            },
            {
                sender: 'future',
                text: "Yes seriously! Listen, I don't have much time, my holographic battery is dying. I called to tell you something important about your upcoming wedding.",
                delay: 1500,
                reply: "Is everything okay??"
            },
            {
                sender: 'future',
                text: "Oh, the wedding is fine. But PLEASE, for the love of God, eat an extra piece of cake on your birthday. In 2075, sugar is illegal. I miss cake so much.",
                delay: 2000,
                reply: "Haha! Anything else?"
            },
            {
                sender: 'future',
                text: "Yes. Arman is still your best friend in 2075. He's bald now, but he's still annoying. Keep him around.",
                delay: 2000,
                reply: "Aww. I will."
            },
            {
                sender: 'future',
                text: "Okay, transmitting a digital birthday hug through the wormhole now. Brace for impact! It's gonna be bright!",
                delay: 2000,
                reply: "[ RECEIVE GIFT ]",
                action: 'triggerWarp'
            }
        ];

        let scriptIndex = 0;
        const chatWindow = document.getElementById('chat-window');
        const optionsArea = document.getElementById('options-area');
        const audioStatic = document.getElementById('static-sound');
        const audioTyping = document.getElementById('typing-sound');
        const audioWarp = document.getElementById('warp-sound');

        // --- FUNCTIONS ---

        function acceptCall() {
            document.getElementById('incoming-screen').style.display = 'none';
            document.getElementById('chat-interface').style.display = 'flex';

            // Start Static Sound (low volume)
            audioStatic.volume = 0.1;
            audioStatic.play().catch(e => console.log("Audio need interaction"));

            playNextLine();
        }

        function playNextLine() {
            if (scriptIndex >= script.length) return;

            const line = script[scriptIndex];
            optionsArea.innerHTML = ''; // Clear buttons

            // Show "Typing..." indicator (simulated by delay)
            const typingDiv = document.createElement('div');
            typingDiv.className = 'text-xs text-gray-500 ml-4 animate-pulse';
            typingDiv.innerText = 'Future_Romana is transmitting...';
            chatWindow.appendChild(typingDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;

            // Play typing sound short burst
            audioTyping.currentTime = 0;
            audioTyping.play();

            setTimeout(() => {
                typingDiv.remove();
                addMessage(line.text, 'future');

                // Show User Reply Button
                const btn = document.createElement('button');
                btn.className = 'reply-btn';
                btn.innerText = `> ${line.reply}`;
                btn.onclick = () => {
                    addMessage(line.reply, 'user');
                    if (line.action === 'triggerWarp') {
                        triggerWarp();
                    } else {
                        scriptIndex++;
                        playNextLine();
                    }
                };
                optionsArea.appendChild(btn);

            }, line.delay);
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `msg msg-${sender}`;
            div.innerText = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // --- WARP EFFECT ---
        function triggerWarp() {
            optionsArea.innerHTML = ''; // Lock interface

            // Sound
            audioStatic.pause();
            audioWarp.play();

            // Init Canvas Warp
            initWarp();
            const canvas = document.getElementById('warp-canvas');
            canvas.style.opacity = '1';

            // Shake Screen
            document.body.style.animation = "shake 0.5s infinite";

            setTimeout(() => {
                document.body.style.animation = "none";
                document.getElementById('chat-interface').style.display = 'none';
                document.getElementById('final-card').style.display = 'block';
                canvas.style.opacity = '0.5'; // Keep stars in background
                fireConfetti();
            }, 3000);
        }

        // --- CANVAS STAR WARP LOGIC ---
        function initWarp() {
            const c = document.getElementById('warp-canvas');
            const ctx = c.getContext('2d');
            let w = c.width = window.innerWidth;
            let h = c.height = window.innerHeight;

            const stars = [];
            const numStars = 500;
            const centerX = w / 2;
            const centerY = h / 2;

            for (let i = 0; i < numStars; i++) {
                stars.push({
                    x: Math.random() * w - centerX,
                    y: Math.random() * h - centerY,
                    z: Math.random() * w
                });
            }

            function anim() {
                // Clear with trails
                ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
                ctx.fillRect(0, 0, w, h);

                for (let i = 0; i < numStars; i++) {
                    let s = stars[i];
                    // Move star closer
                    s.z -= 15; // Speed

                    if (s.z <= 0) {
                        s.x = Math.random() * w - centerX;
                        s.y = Math.random() * h - centerY;
                        s.z = w;
                    }

                    let k = 128.0 / s.z;
                    let px = s.x * k + centerX;
                    let py = s.y * k + centerY;

                    if (px >= 0 && px <= w && py >= 0 && py <= h) {
                        let size = (1 - s.z / w) * 5;
                        let shade = parseInt((1 - s.z / w) * 255);
                        ctx.fillStyle = "rgb(" + shade + "," + shade + ",255)";
                        ctx.beginPath();
                        ctx.arc(px, py, size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                requestAnimationFrame(anim);
            }
            anim();
        }

        function fireConfetti() {
            var duration = 5 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };
            var random = function (min, max) { return Math.random() * (max - min) + min; };

            var interval = setInterval(function () {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: random(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: random(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }

    </script>
</body>

</html>
