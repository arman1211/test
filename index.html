<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚠️ SECRET CHAT LEAKED</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Sans+Bengali:wght@400;600;700&display=swap"
        rel="stylesheet">

    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background-color: #0f172a;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        .bangla {
            font-family: 'Noto Sans Bengali', sans-serif;
        }

        /* WhatsApp Style Background */
        #chat-screen {
            background-color: #efeae2;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 10h10v10H10V10zm20 20h10v10H30V30zm-10 20h10v10H20V50zm40-20h10v10H60V30zm20 20h10v10H80V50zm-20 20h10v10H60V70z' fill='%239ca3af' fill-opacity='0.05'/%3E%3C/svg%3E");
        }

        .dark-mode-chat {
            background-color: #0b141a;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 10h10v10H10V10zm20 20h10v10H30V30zm-10 20h10v10H20V50zm40-20h10v10H60V30zm20 20h10v10H80V50zm-20 20h10v10H60V70z' fill='%23ffffff' fill-opacity='0.03'/%3E%3C/svg%3E");
        }

        /* Message Bubbles */
        .msg {
            max-width: 80%;
            margin-bottom: 12px;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            position: relative;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            opacity: 0;
            transform: translateY(20px);
            animation: popIn 0.3s forwards;
        }

        .msg-in {
            align-self: flex-start;
            background: #ffffff;
            color: #111827;
            border-top-left-radius: 0;
        }

        .msg-out {
            align-self: flex-end;
            background: #d9fdd3;
            color: #111827;
            border-top-right-radius: 0;
        }

        .msg-sys {
            align-self: center;
            background: #fff5c4;
            color: #4b5563;
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 4px;
            text-align: center;
            box-shadow: none;
            max-width: 90%;
            margin-top: 5px;
            margin-bottom: 5px;
        }

        .msg-hack {
            align-self: center;
            background: #000;
            color: #0f0;
            border: 1px solid #0f0;
            font-family: monospace;
            text-align: center;
        }

        @keyframes popIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .sender-name {
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 2px;
            display: block;
        }

        /* Colors for senders */
        .color-amma {
            color: #d946ef;
        }

        /* Purple */
        .color-nonod {
            color: #f59e0b;
        }

        /* Orange */
        .color-jamai {
            color: #3b82f6;
        }

        /* Blue */
        .color-arman {
            color: #ef4444;
        }

        /* Red */

        /* Header */
        .header {
            background-color: #008069;
            /* WhatsApp Green */
            color: white;
        }

        /* Lock Screen */
        .blur-reveal {
            filter: blur(10px);
            transition: filter 1s;
        }

        .unblur {
            filter: blur(0);
        }

        /* Hacker Shake */
        .shake {
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0% {
                transform: translate(1px, 1px) rotate(0deg);
            }

            10% {
                transform: translate(-1px, -2px) rotate(-1deg);
            }

            20% {
                transform: translate(-3px, 0px) rotate(1deg);
            }

            30% {
                transform: translate(3px, 2px) rotate(0deg);
            }

            40% {
                transform: translate(1px, -1px) rotate(1deg);
            }

            50% {
                transform: translate(-1px, 2px) rotate(-1deg);
            }

            60% {
                transform: translate(-3px, 1px) rotate(0deg);
            }

            70% {
                transform: translate(3px, 1px) rotate(-1deg);
            }

            80% {
                transform: translate(-1px, -1px) rotate(1deg);
            }

            90% {
                transform: translate(1px, 2px) rotate(0deg);
            }

            100% {
                transform: translate(1px, -2px) rotate(-1deg);
            }
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen bg-black">

    <!-- AUDIO -->
    <audio id="notif-sound" src="https://assets.mixkit.co/sfx/preview/mixkit-software-interface-start-2574.mp3"></audio>
    <audio id="hack-sound"
        src="https://assets.mixkit.co/sfx/preview/mixkit-glitch-interference-static-1440.mp3"></audio>
    <audio id="party-music" loop src="https://pixabay.com/music/beats-happy-birthday-trap-version-13838/"></audio>


    <!-- === SCREEN 1: THE LOCK === -->
    <div id="screen-lock"
        class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-gray-900 text-center p-6">
        <div class="bg-gray-800 p-8 rounded-2xl border border-red-500/50 shadow-2xl max-w-sm w-full">
            <i class="fas fa-user-secret text-6xl text-red-500 mb-6 animate-pulse"></i>
            <h1 class="text-2xl font-bold text-white mb-2">SECRET CHAT DETECTED</h1>
            <p class="text-gray-400 text-sm mb-6 font-mono">
                Source: "Future Shoshur Bari Group" <br>
                Status: <span class="text-yellow-400">Active Gossip...</span>
            </p>

            <button onclick="unlockChat()"
                class="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-3 px-6 rounded-lg transition transform active:scale-95 shadow-lg shadow-red-500/30">
                TAP TO SPY 🕵️‍♀️
            </button>
            <p class="text-[10px] text-gray-500 mt-4">* Warning: You might get angry.</p>
        </div>
    </div>


    <!-- === SCREEN 2: THE CHAT === -->
    <div id="phone-frame" class="relative w-full h-[100vh] max-w-md bg-white overflow-hidden shadow-2xl blur-reveal">

        <!-- Header -->
        <div id="chat-header" class="header p-3 flex items-center gap-3 shadow-md z-10 relative">
            <div
                class="w-10 h-10 rounded-full bg-gray-300 flex items-center justify-center text-gray-600 font-bold overflow-hidden">
                <i class="fas fa-users"></i>
            </div>
            <div class="flex-1">
                <h2 class="font-bold text-base leading-tight">Future In-Laws 🐍</h2>
                <p id="typing-indicator" class="text-xs text-green-100 opacity-0">Amma is typing...</p>
            </div>
            <div class="flex gap-4 text-xl">
                <i class="fas fa-video"></i>
                <i class="fas fa-phone"></i>
                <i class="fas fa-ellipsis-v"></i>
            </div>
        </div>

        <!-- Chat Area -->
        <div id="chat-screen" class="h-full overflow-y-auto p-4 flex flex-col pb-20">
            <!-- Messages will be injected here -->
        </div>

        <!-- Footer -->
        <div class="absolute bottom-0 w-full bg-gray-100 p-2 flex items-center gap-2 z-10">
            <div class="bg-white rounded-full p-2 text-gray-500"><i class="far fa-smile"></i></div>
            <div class="flex-1 bg-white rounded-full px-4 py-2 text-gray-400 text-sm">Read only...</div>
            <div class="bg-teal-600 rounded-full p-3 text-white"><i class="fas fa-microphone"></i></div>
        </div>

    </div>

    <script>
        const chatScreen = document.getElementById('chat-screen');
        const typingInd = document.getElementById('typing-indicator');
        const header = document.getElementById('chat-header');
        const phoneFrame = document.getElementById('phone-frame');

        // Sounds
        const sndNotif = document.getElementById('notif-sound');
        const sndHack = document.getElementById('hack-sound');
        const sndMusic = document.getElementById('party-music');

        let msgDelay = 1500; // Speed of chat

        const chatScript = [
            {
                sender: "Amma (Future MIL)", color: "color-amma",
                text: "শোন সবাই, কালকে না ওই মেয়েটার জন্মদিন? ওই যে, রোমানা?",
                delay: 1000
            },
            {
                sender: "Jamai (Future Husband)", color: "color-jamai",
                text: "হ্যাঁ আম্মা, কালকেই তো। আমি কি গিফট দিবো ভাবছি...",
                delay: 2000
            },
            {
                sender: "Nonod (Sister-in-Law)", color: "color-nonod",
                text: "ভাইয়া, ওকে একটা 'অ্যালার্ম ঘড়ি' গিফট করো! 😂",
                delay: 2500
            },
            {
                sender: "Nonod (Sister-in-Law)", color: "color-nonod",
                text: "শুনলাম ভাবি নাকি দুপুর ১২ টার আগে ঘুম থেকে উঠে না!",
                delay: 1500
            },
            {
                sender: "Amma (Future MIL)", color: "color-amma",
                text: "ওমা বলো কি! 😱 তাহলে আমার সকালের চা কে বানাবে?",
                delay: 2000
            },
            {
                sender: "Jamai (Future Husband)", color: "color-jamai",
                text: "আস্তে বলো... ও শুনলে কিন্তু আমাকে শেষ করে দিবে। 🤐",
                delay: 2000
            },
            {
                sender: "Amma (Future MIL)", color: "color-amma",
                text: "রান্না তো মনে হয় কিছুই পারে না। কালকে ওকে দিয়ে ২০ জনের রান্না করাবো। টেস্ট নিবো। 😏",
                delay: 2500
            },
            {
                sender: "Nonod (Sister-in-Law)", color: "color-nonod",
                text: "হ্যাঁ মা! আর গিফট হিসেবে একটা 'রান্নার বই' দিও। 🤣",
                delay: 2000
            },
            // THE HACK STARTS HERE
            { type: 'system', text: "⚠ UNUSUAL ACTIVITY DETECTED" },
            { type: 'system', text: "⚠ BEST FRIEND PROTOCOL ACTIVATED" },
            { type: 'hack_intro', delay: 500 },
            {
                sender: "Arman (HACKER)", color: "color-arman",
                text: "OYE!!! STOP RIGHT THERE! 🛑",
                delay: 1000
            },
            {
                sender: "Arman (HACKER)", color: "color-arman",
                text: "আমার বেস্ট ফ্রেন্ড এর নামে গসিপ করা চলবে না! 😡",
                delay: 1500
            },
            { type: 'action', text: "Arman removed 'Amma' from the group." },
            { type: 'action', text: "Arman removed 'Nonod' from the group." },
            { type: 'action', text: "Arman muted 'Jamai'." },
            {
                sender: "Arman (HACKER)", color: "color-arman",
                text: "রোমানা ঘুমালে ঘুমাক! রান্নাবান্না অর্ডার করা হবে! 🍕",
                delay: 1500
            },
            { type: 'rename', text: "Group Name changed to 'Happy Birthday Romana! 🎉'" },
            { type: 'finale' } // Triggers confetti
        ];

        function unlockChat() {
            document.getElementById('screen-lock').style.display = 'none';
            phoneFrame.classList.remove('blur-reveal');

            // Start sequence
            processScript(0);
        }

        function processScript(index) {
            if (index >= chatScript.length) return;

            const item = chatScript[index];
            let currentDelay = item.delay || 1500;

            if (item.type === 'hack_intro') {
                triggerHackEffect();
                setTimeout(() => processScript(index + 1), 2000);
                return;
            }

            if (item.type === 'finale') {
                triggerFinale();
                return;
            }

            if (item.type === 'rename') {
                document.querySelector('h2').innerText = "Happy Birthday Romana! 🎉";
                addSystemMsg(item.text);
                setTimeout(() => processScript(index + 1), 1000);
                return;
            }

            if (item.type === 'system' || item.type === 'action') {
                addSystemMsg(item.text);
                setTimeout(() => processScript(index + 1), 1000);
                return;
            }

            // Regular Message
            // Show typing indicator
            typingInd.innerText = `${item.sender.split(' ')[0]} is typing...`;
            typingInd.style.opacity = '1';

            setTimeout(() => {
                typingInd.style.opacity = '0';
                addMessage(item);
                sndNotif.currentTime = 0;
                sndNotif.play().catch(e => { });

                setTimeout(() => processScript(index + 1), 500); // Wait bit before next logic
            }, currentDelay);
        }

        function addMessage(item) {
            const div = document.createElement('div');
            // Check if it's Arman (Hacker)
            if (item.color === 'color-arman') {
                div.className = `msg msg-out border border-red-500 bg-red-50`;
            } else {
                div.className = `msg msg-in`;
            }

            div.innerHTML = `
                <span class="sender-name ${item.color}">${item.sender}</span>
                ${item.text}
                <span class="text-[9px] text-gray-400 block text-right mt-1">Now</span>
            `;
            chatScreen.appendChild(div);
            chatScreen.scrollTop = chatScreen.scrollHeight;
        }

        function addSystemMsg(text) {
            const div = document.createElement('div');
            div.className = "msg-sys";
            div.innerHTML = text;
            chatScreen.appendChild(div);
            chatScreen.scrollTop = chatScreen.scrollHeight;
        }

        function triggerHackEffect() {
            // Shake screen
            phoneFrame.classList.add('shake');
            sndHack.play();

            // Invert colors momentarily
            chatScreen.style.filter = "invert(1)";

            setTimeout(() => {
                chatScreen.style.filter = "invert(0)";
                phoneFrame.classList.remove('shake');

                // Change Theme to Dark/Hacker
                chatScreen.classList.add('dark-mode-chat');
                header.style.backgroundColor = "#000000";
            }, 1000);
        }

        function triggerFinale() {
            sndMusic.play();
            fireConfetti();

            // Add Final Wish Bubble
            const div = document.createElement('div');
            div.className = "msg msg-hack w-full animate-bounce mt-8 p-6";
            div.innerHTML = `
                <h1 class="text-2xl font-bold mb-2">HAPPY BIRTHDAY BESTIE!</h1>
                <p class="text-white text-sm">
                    Don't worry about in-laws, I've handled them. 😎<br>
                    Enjoy your last single birthday!
                </p>
                <p class="text-xs text-gray-500 mt-4">- Hacker Arman</p>
            `;
            chatScreen.appendChild(div);
            chatScreen.scrollTop = chatScreen.scrollHeight;
        }

        function fireConfetti() {
            var duration = 5 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };
            var random = function (min, max) { return Math.random() * (max - min) + min; };

            var interval = setInterval(function () {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: random(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: random(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }

    </script>
</body>

</html>
